<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 뉴스 데일리</title>
<style>
  :root{
    --bg:#0b0d10; --surface:#15181d; --surface-2:#1c2026;
    --border:#272c34; --text:#e6e9ef; --muted:#8b929e;
    --accent:#6ea8fe; --accent-soft:#1b2b47;
    --yt:#ff5252; --news:#34d399; --guide:#c084fc; --hn:#ff9100; --star:#ffce5a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);
    font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  header{position:sticky;top:0;z-index:20;background:rgba(11,13,16,.88);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .head-inner{max-width:1200px;margin:0 auto;padding:16px 24px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
  .brand .dot{width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#a78bfa);box-shadow:0 0 12px var(--accent)}
  .brand small{color:var(--muted);font-weight:400;font-size:13px}
  .spacer{flex:1}
  select,input,button{font-family:inherit}
  select,input{background:var(--surface-2);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  input{width:200px}
  input::placeholder{color:var(--muted)}
  select:focus,input:focus{border-color:var(--accent)}
  .libbtn{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:7px}
  .libbtn:hover{border-color:var(--accent)}
  .libbtn.active{background:var(--accent-soft);border-color:var(--accent);color:#fff}
  .libbtn .cnt{background:var(--accent);color:#08101f;border-radius:999px;
    font-size:11px;font-weight:700;padding:1px 7px;min-width:18px;text-align:center}

  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-top:16px}
  .chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);
    padding:6px 14px;border-radius:999px;font-size:13px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--accent);color:var(--text)}
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:#fff}
  .meta-line{color:var(--muted);font-size:13px;padding-top:14px}

  /* 데일리 브리핑 */
  .briefing{padding-top:18px}
  .briefing-inner{background:linear-gradient(135deg,rgba(110,168,254,.10),rgba(167,139,250,.08));
    border:1px solid #2c3344;border-radius:16px;padding:24px 28px}
  .briefing h2{font-size:15px;color:var(--accent);letter-spacing:.03em;margin-bottom:12px}
  .briefing .overview{font-size:16px;line-height:1.7;margin-bottom:18px}
  .briefing ol{list-style:none;counter-reset:hl;display:flex;flex-direction:column;gap:11px}
  .briefing ol li{counter-increment:hl;position:relative;padding-left:34px;line-height:1.55}
  .briefing ol li::before{content:counter(hl);position:absolute;left:0;top:1px;width:22px;height:22px;
    border-radius:50%;background:var(--accent);color:#08101f;font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center}
  .briefing ol li b{color:#fff}
  .briefing ol li span{color:var(--muted)}

  /* 공통 배지 */
  .badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600}
  .badge.news{background:rgba(52,211,153,.12);color:var(--news)}
  .badge.youtube{background:rgba(255,82,82,.12);color:var(--yt)}
  .badge.guide{background:rgba(192,132,252,.14);color:var(--guide)}
  .badge.hn{background:rgba(255,145,0,.14);color:var(--hn)}
  .badge.cat{background:var(--surface-2);color:var(--muted);font-weight:500}
  .metric{font-size:12px;color:var(--accent);font-weight:600}
  .a-src{color:var(--muted);font-size:12px}

  /* 카드 그리드 */
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));padding:18px 0 60px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;transition:.18s;cursor:pointer;position:relative}
  .card:hover{transform:translateY(-3px);border-color:#3a4151;box-shadow:0 8px 28px rgba(0,0,0,.4)}
  .thumb{aspect-ratio:16/9;background:#000;object-fit:cover;width:100%;display:block}
  .card-body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .card-body .badges{padding-right:36px}
  .card .title{font-size:16px;font-weight:650;line-height:1.4}
  .card:hover .title{color:var(--accent)}
  .card .summary{color:var(--muted);font-size:14px;flex:1;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px}
  .card-foot .more{color:var(--accent);font-weight:600}
  .scrap-btn{position:absolute;top:10px;right:10px;z-index:3;width:34px;height:34px;border-radius:50%;
    background:rgba(11,13,16,.72);border:1px solid var(--border);color:var(--muted);cursor:pointer;
    font-size:16px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .scrap-btn:hover{color:var(--star);border-color:var(--star)}
  .scrap-btn.on{color:var(--star);border-color:var(--star);background:rgba(255,200,80,.14)}
  .empty{margin:80px auto;text-align:center;color:var(--muted)}
  .empty code{background:var(--surface-2);padding:2px 8px;border-radius:6px;color:var(--accent)}

  /* 리더 오버레이 (이전/다음) */
  .overlay{position:fixed;inset:0;z-index:50;display:none;background:rgba(0,0,0,.6);
    backdrop-filter:blur(4px);overflow-y:auto}
  .overlay.open{display:block}
  .reader{max-width:780px;margin:0 auto;min-height:100%;background:var(--surface);
    border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0 38px 50px}
  .reader-nav{position:sticky;top:0;background:rgba(21,24,29,.92);backdrop-filter:blur(8px);
    margin:0 -38px 8px;padding:14px 24px;display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--border)}
  .reader-nav button{background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    border-radius:9px;padding:8px 14px;font-size:14px;cursor:pointer}
  .reader-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .reader-nav button:disabled{opacity:.35;cursor:default}
  .reader-nav .pos{color:var(--muted);font-size:13px}
  .reader-nav .x{margin-left:auto}

  .embed{position:relative;aspect-ratio:16/9;margin:16px 0;border-radius:12px;overflow:hidden;background:#000}
  .embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .a-title{font-size:23px;line-height:1.35;margin:10px 0}
  .a-detail{margin-bottom:22px}
  .a-detail p{font-size:16px;line-height:1.9;color:#dfe3ea;margin:0 0 15px}
  .a-detail p:last-child{margin-bottom:0}
  .sec-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-bottom:10px}
  .points{list-style:none;margin-bottom:22px;display:flex;flex-direction:column;gap:9px}
  .points li{position:relative;padding-left:22px;font-size:15px;line-height:1.6;color:#dfe3ea}
  .points li::before{content:"▹";position:absolute;left:0;color:var(--accent)}
  .takeaway{background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:8px;
    padding:14px 16px;font-size:15px;line-height:1.7;margin-bottom:24px}
  .takeaway b{color:var(--accent);display:block;margin-bottom:4px;font-size:13px}
  .a-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .src-link,.scrap-toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:10px 16px;font-size:14px;color:var(--text);font-weight:600}
  .src-link:hover{border-color:var(--accent);color:var(--accent)}
  .scrap-toggle:hover{border-color:var(--star);color:var(--star)}
  .scrap-toggle.on{border-color:var(--star);color:var(--star);background:rgba(255,200,80,.12)}
  @media(max-width:760px){ input{width:140px} }
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="brand"><span class="dot"></span>AI 뉴스 데일리 <small id="genTime"></small></div>
    <div class="spacer"></div>
    <button id="libBtn" class="libbtn">🔖 보관함 <span class="cnt" id="libCnt">0</span></button>
    <select id="dateSel"></select>
    <input id="search" type="search" placeholder="검색...">
  </div>
</header>

<div class="wrap">
  <div class="briefing" id="briefing"></div>
  <div class="filters" id="filters"></div>
  <div class="meta-line" id="metaLine"></div>
  <div id="content"></div>
</div>
<div class="overlay" id="overlay"></div>

<script>
const CATS = ["전체","AI 활용/팁","도구 업데이트","LLM/언어모델","이미지/비디오","연구/논문","산업/투자","정책/규제","기타"];
let allItems = [], activeCat = "전체", query = "", inLibrary = false, readerIndex = 0;

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const TYPE = {youtube:"▶ 영상", guide:"💡 가이드", hn:"🔥 HN", news:"📰 뉴스"};

// 본문을 문단으로: 배열이면 그대로, 문자열이면 ~3문장씩 묶어 문단 생성
function detailParas(it){
  if(Array.isArray(it.detail)) return it.detail.filter(p=>p&&String(p).trim());
  const t = String(it.detail||it.summary||"").trim();
  if(!t) return [];
  const sents = t.split(/(?<=[.!?。])\s+/).filter(s=>s.trim());
  const paras = [];
  for(let i=0;i<sents.length;i+=3) paras.push(sents.slice(i,i+3).join(" "));
  return paras;
}

function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso); if(isNaN(d)) return "";
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

/* ── 스크랩(보관함) ── */
const SCRAP_KEY = "ai-news-scraps";
let scraps = (()=>{ try{return JSON.parse(localStorage.getItem(SCRAP_KEY))||{}}catch(e){return {}} })();
function saveScraps(){ localStorage.setItem(SCRAP_KEY, JSON.stringify(scraps)); }
function isScrapped(it){ return it && it.url && !!scraps[it.url]; }
function findItem(url){ return scraps[url] || allItems.find(x=>x.url===url); }
function toggleScrapByUrl(url){
  const it = findItem(url); if(!it) return;
  if(scraps[url]) delete scraps[url]; else scraps[url] = {...it, scrappedAt:new Date().toISOString()};
  saveScraps(); updateLibCount(); render();
}
function updateLibCount(){
  $("#libCnt").textContent = Object.keys(scraps).length;
  $("#libBtn").classList.toggle("active", inLibrary);
}

/* ── 현재 보여줄 항목 ── */
function filtered(){
  const q = query.trim().toLowerCase();
  let src = inLibrary ? Object.values(scraps) : allItems;
  let list = src.filter(it=>{
    if(activeCat!=="전체" && it.category!==activeCat) return false;
    if(q && !((it.title_ko||"")+(it.title||"")+(it.summary||"")+(it.detail||"")).toLowerCase().includes(q)) return false;
    return true;
  });
  if(inLibrary) list = list.sort((a,b)=>(b.scrappedAt||"").localeCompare(a.scrappedAt||""));
  return list;
}

/* ── 본문(리더) HTML ── */
function articleHTML(it){
  const embed = it.type==="youtube" && it.videoId
    ? `<div class="embed"><iframe src="https://www.youtube.com/embed/${esc(it.videoId)}" allowfullscreen loading="lazy"></iframe></div>` : "";
  const points = (it.points&&it.points.length)
    ? `<div class="sec-title">주요 내용</div><ul class="points">${it.points.map(p=>`<li>${esc(p)}</li>`).join("")}</ul>` : "";
  const takeaway = it.takeaway ? `<div class="takeaway"><b>왜 중요한가</b>${esc(it.takeaway)}</div>` : "";
  const metric = it.metric ? ` · <span class="metric">${esc(it.metric)}</span>` : "";
  const on = isScrapped(it);
  return `
    <div class="badges">
      <span class="badge ${esc(it.type)}">${TYPE[it.type]||"📰 뉴스"}</span>
      <span class="badge cat">${esc(it.category||"기타")}</span>
      <span class="a-src">${esc(it.source||"")} · ${fmtDate(it.published)}${metric}</span>
    </div>
    <h2 class="a-title">${esc(it.title_ko||it.title||"")}</h2>
    ${embed}
    <div class="a-detail">${detailParas(it).map(p=>`<p>${esc(p)}</p>`).join("")}</div>
    ${points}${takeaway}
    <div class="a-actions">
      <button class="scrap-toggle ${on?"on":""}" data-url="${esc(it.url)}">${on?"★ 보관됨":"☆ 보관"}</button>
      <a class="src-link" href="${esc(it.url)}" target="_blank" rel="noopener">원문에서 보기 ↗</a>
    </div>`;
}

/* ── 카드 그리드 렌더 ── */
function render(){
  const items = filtered();
  $("#metaLine").textContent = (inLibrary?"🔖 보관함 · ":"") + `${items.length}건`;
  const c = $("#content");
  if(!items.length){
    c.innerHTML = inLibrary
      ? `<div class="empty">아직 스크랩한 항목이 없어요.<br>카드의 ☆ 버튼으로 보관해보세요.</div>`
      : `<div class="empty">표시할 항목이 없습니다.</div>`;
    return;
  }
  c.innerHTML = `<div class="grid">${items.map((it,i)=>{
    const thumb = it.thumbnail ? `<img class="thumb" src="${esc(it.thumbnail)}" loading="lazy" alt="">` : "";
    const on = isScrapped(it);
    const metric = it.metric ? `<span class="metric">${esc(it.metric)}</span>` : "";
    return `<div class="card" data-i="${i}">
      <button class="scrap-btn ${on?"on":""}" data-url="${esc(it.url)}">${on?"★":"☆"}</button>
      ${thumb}
      <div class="card-body">
        <div class="badges">
          <span class="badge ${esc(it.type)}">${TYPE[it.type]||"📰 뉴스"}</span>
          <span class="badge cat">${esc(it.category||"기타")}</span>
        </div>
        <div class="title">${esc(it.title_ko||it.title||"")}</div>
        <div class="summary">${esc(it.summary||"")}</div>
        <div class="card-foot"><span>${fmtDate(it.published)} ${metric}</span><span class="more">자세히 읽기 →</span></div>
      </div></div>`;
  }).join("")}</div>`;
  c.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", e=>{
      if(e.target.closest(".scrap-btn")) return;
      openReader(+card.dataset.i);
    });
  });
}

/* ── 리더 (이전/다음) ── */
function openReader(i){ readerIndex=i; drawReader(); $("#overlay").classList.add("open"); document.body.style.overflow="hidden"; }
function drawReader(){
  const items = filtered();
  if(!items.length){ closeReader(); return; }
  readerIndex = Math.max(0, Math.min(readerIndex, items.length-1));
  const it = items[readerIndex];
  $("#overlay").innerHTML = `<div class="reader">
    <div class="reader-nav">
      <button id="rPrev" ${readerIndex===0?"disabled":""}>◀ 이전</button>
      <span class="pos">${readerIndex+1} / ${items.length}</span>
      <button id="rNext" ${readerIndex===items.length-1?"disabled":""}>다음 ▶</button>
      <button class="x" id="rClose">✕ 닫기</button>
    </div>
    ${articleHTML(it)}
  </div>`;
  const ov = $("#overlay");
  ov.onclick = e=>{ if(e.target===ov) closeReader(); };
  $("#rPrev").onclick = ()=>{ readerIndex--; drawReader(); ov.scrollTop=0; };
  $("#rNext").onclick = ()=>{ readerIndex++; drawReader(); ov.scrollTop=0; };
  $("#rClose").onclick = closeReader;
}
function closeReader(){ $("#overlay").classList.remove("open"); document.body.style.overflow=""; }

/* ── 브리핑 ── */
function renderBriefing(b){
  const box = $("#briefing");
  if(!b || (!b.overview && !(b.highlights||[]).length)){ box.innerHTML=""; return; }
  const hl = (b.highlights||[]).map(h=>`<li><b>${esc(h.title||"")}</b> <span>${esc(h.line||"")}</span></li>`).join("");
  box.innerHTML = `<div class="briefing-inner"><h2>✨ 오늘의 핵심</h2>
    ${b.overview?`<div class="overview">${esc(b.overview)}</div>`:""}
    ${hl?`<ol>${hl}</ol>`:""}</div>`;
}

/* ── 필터 칩 ── */
function renderFilters(){
  $("#filters").innerHTML = CATS.map(c=>`<div class="chip ${c===activeCat?"active":""}" data-c="${esc(c)}">${esc(c)}</div>`).join("");
  $("#filters").querySelectorAll(".chip").forEach(el=>{
    el.onclick = ()=>{ activeCat=el.dataset.c; renderFilters(); render(); };
  });
}

/* ── 데이터 로드 ── */
async function loadDate(date){
  try{
    const doc = await (await fetch(`data/${date}.json`)).json();
    allItems = doc.items || [];
    renderBriefing(doc.briefing);
    $("#genTime").textContent = `· ${doc.date} 기준`;
  }catch(e){ allItems=[]; renderBriefing(null); $("#genTime").textContent=""; }
  render();
}

async function init(){
  renderFilters(); updateLibCount();
  $("#libBtn").onclick = ()=>{ inLibrary=!inLibrary; updateLibCount(); render(); };
  $("#search").addEventListener("input", e=>{ query=e.target.value; render(); });
  document.addEventListener("click", e=>{
    const b = e.target.closest(".scrap-btn,.scrap-toggle");
    if(b){ e.stopPropagation(); toggleScrapByUrl(b.dataset.url); if($("#overlay").classList.contains("open")) drawReader(); }
  });
  document.addEventListener("keydown", e=>{
    if(!$("#overlay").classList.contains("open")) return;
    if(e.key==="Escape") closeReader();
    else if(e.key==="ArrowLeft"){ readerIndex--; drawReader(); }
    else if(e.key==="ArrowRight"){ readerIndex++; drawReader(); }
  });

  try{
    const man = await (await fetch("data/manifest.json")).json();
    const dates = man.dates || [];
    if(!dates.length){ showSetup(); return; }
    const sel = $("#dateSel");
    dates.forEach(d=>{ const o=document.createElement("option"); o.value=o.textContent=d; sel.appendChild(o); });
    sel.onchange = ()=>{ inLibrary=false; updateLibCount(); loadDate(sel.value); };
    loadDate(dates[0]);
  }catch(e){ showSetup(); }
}
function showSetup(){
  $("#content").innerHTML = `<div class="empty">아직 수집된 데이터가 없어요.<br>
    <code>python collect.py</code> 실행 후 <code>python -m http.server 8000</code> 으로 여세요.</div>`;
}
init();
</script>
</body>
</html>
