<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 뉴스 데일리</title>
<style>
  :root{
    --bg:#0b0d10; --surface:#15181d; --surface-2:#1c2026;
    --border:#272c34; --text:#e6e9ef; --muted:#8b929e;
    --accent:#6ea8fe; --accent-soft:#1b2b47;
    --yt:#ff5252; --news:#34d399; --guide:#c084fc; --hn:#ff9100;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}

  header{
    position:sticky;top:0;z-index:10;
    background:rgba(11,13,16,.85);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .head-inner{
    max-width:1200px;margin:0 auto;padding:18px 24px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
  .brand .dot{width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#a78bfa);box-shadow:0 0 12px var(--accent)}
  .brand small{color:var(--muted);font-weight:400;font-size:13px}
  .spacer{flex:1}
  select,input{
    background:var(--surface-2);color:var(--text);
    border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;font-size:14px;outline:none;
  }
  input{width:220px}
  input::placeholder{color:var(--muted)}
  select:focus,input:focus{border-color:var(--accent)}

  .filters{
    max-width:1200px;margin:0 auto;padding:16px 24px 0;
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  }
  .chip{
    background:var(--surface);border:1px solid var(--border);
    color:var(--muted);padding:6px 14px;border-radius:999px;
    font-size:13px;cursor:pointer;transition:.15s;
  }
  .chip:hover{border-color:var(--accent);color:var(--text)}
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:#fff}
  .meta-line{max-width:1200px;margin:0 auto;padding:14px 24px 0;color:var(--muted);font-size:13px}

  /* ── 데일리 브리핑 ── */
  .briefing{
    max-width:1200px;margin:18px auto 0;padding:0 24px;
  }
  .briefing-inner{
    background:linear-gradient(135deg,rgba(110,168,254,.10),rgba(167,139,250,.08));
    border:1px solid #2c3344;border-radius:16px;padding:24px 28px;
  }
  .briefing h2{font-size:15px;color:var(--accent);letter-spacing:.03em;margin-bottom:12px;
    display:flex;align-items:center;gap:8px}
  .briefing .overview{font-size:16px;line-height:1.7;color:#e6e9ef;margin-bottom:18px}
  .briefing ol{list-style:none;counter-reset:hl;display:flex;flex-direction:column;gap:11px}
  .briefing ol li{counter-increment:hl;position:relative;padding-left:34px;line-height:1.55}
  .briefing ol li::before{content:counter(hl);position:absolute;left:0;top:1px;
    width:22px;height:22px;border-radius:50%;background:var(--accent);color:#08101f;
    font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .briefing ol li b{color:#fff}
  .briefing ol li span{color:var(--muted)}

  .grid{
    max-width:1200px;margin:0 auto;padding:18px 24px 60px;
    display:grid;gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  }
  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
    transition:.18s;cursor:pointer;position:relative;
  }
  .scrap-btn{
    position:absolute;top:10px;right:10px;z-index:3;
    width:34px;height:34px;border-radius:50%;
    background:rgba(11,13,16,.72);border:1px solid var(--border);
    color:var(--muted);cursor:pointer;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
    transition:.15s;
  }
  .scrap-btn:hover{color:#ffce5a;border-color:#ffce5a}
  .scrap-btn.on{color:#ffce5a;border-color:#ffce5a;background:rgba(255,200,80,.14)}
  .libbtn{
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;
    align-items:center;gap:7px;transition:.15s;
  }
  .libbtn:hover{border-color:var(--accent)}
  .libbtn.active{background:var(--accent-soft);border-color:var(--accent);color:#fff}
  .libbtn .cnt{background:var(--accent);color:#08101f;border-radius:999px;
    font-size:11px;font-weight:700;padding:1px 7px;min-width:18px;text-align:center}
  .card:hover{transform:translateY(-3px);border-color:#3a4151;
    box-shadow:0 8px 28px rgba(0,0,0,.4)}
  .thumb{aspect-ratio:16/9;background:#000;object-fit:cover;width:100%;display:block}
  .card-body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .card-body .badges{padding-right:36px}
  .badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600}
  .badge.news{background:rgba(52,211,153,.12);color:var(--news)}
  .badge.youtube{background:rgba(255,82,82,.12);color:var(--yt)}
  .badge.guide{background:rgba(192,132,252,.14);color:var(--guide)}
  .badge.hn{background:rgba(255,145,0,.14);color:var(--hn)}
  .metric{font-size:12px;color:var(--accent);font-weight:600}
  .badge.cat{background:var(--surface-2);color:var(--muted);font-weight:500}
  .source{color:var(--muted);font-size:12px;margin-left:auto}
  .title{font-size:16px;font-weight:650;line-height:1.4}
  .card:hover .title{color:var(--accent)}
  .summary{color:var(--muted);font-size:14px;flex:1;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:12px;margin-top:4px}
  .card-foot .more{color:var(--accent);font-weight:600}
  .empty{max-width:1200px;margin:80px auto;text-align:center;color:var(--muted)}
  .empty code{background:var(--surface-2);padding:2px 8px;border-radius:6px;color:var(--accent)}

  /* ── 리더 오버레이 ── */
  .overlay{
    position:fixed;inset:0;z-index:50;display:none;
    background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    padding:40px 20px;overflow-y:auto;
  }
  .overlay.open{display:block}
  .reader{
    max-width:760px;margin:0 auto;background:var(--surface);
    border:1px solid var(--border);border-radius:18px;
    padding:34px 38px 40px;position:relative;
    animation:rise .22s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .reader .close{
    position:absolute;top:18px;right:20px;width:34px;height:34px;
    border-radius:50%;border:1px solid var(--border);background:var(--surface-2);
    color:var(--muted);font-size:18px;cursor:pointer;line-height:1;
  }
  .reader .close:hover{color:#fff;border-color:var(--accent)}
  .reader .badges{margin-bottom:14px}
  .reader h1{font-size:25px;line-height:1.35;margin-bottom:10px;padding-right:30px}
  .reader .r-meta{color:var(--muted);font-size:13px;margin-bottom:22px}
  .reader .embed{position:relative;aspect-ratio:16/9;margin-bottom:22px;border-radius:12px;overflow:hidden}
  .reader .embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .reader .detail{font-size:16px;line-height:1.85;color:#dfe3ea;white-space:pre-wrap;margin-bottom:24px}
  .reader .sec-title{font-size:13px;font-weight:700;color:var(--accent);
    letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
  .reader .points{list-style:none;margin-bottom:24px;display:flex;flex-direction:column;gap:9px}
  .reader .points li{position:relative;padding-left:22px;font-size:15px;line-height:1.6;color:#dfe3ea}
  .reader .points li::before{content:"▹";position:absolute;left:0;color:var(--accent)}
  .reader .takeaway{
    background:var(--accent-soft);border-left:3px solid var(--accent);
    border-radius:8px;padding:14px 16px;font-size:15px;line-height:1.7;margin-bottom:26px;
  }
  .reader .takeaway b{color:var(--accent);display:block;margin-bottom:4px;font-size:13px}
  .reader .src-link{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:11px 18px;font-size:14px;color:var(--text);font-weight:600;
  }
  .reader .src-link:hover{border-color:var(--accent);color:var(--accent)}
  .reader .r-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .reader .scrap-toggle{
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:11px 18px;font-size:14px;color:var(--text);font-weight:600;
  }
  .reader .scrap-toggle:hover{border-color:#ffce5a;color:#ffce5a}
  .reader .scrap-toggle.on{border-color:#ffce5a;color:#ffce5a;background:rgba(255,200,80,.12)}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="brand">
      <span class="dot"></span>
      AI 뉴스 데일리
      <small id="genTime"></small>
    </div>
    <div class="spacer"></div>
    <button id="libBtn" class="libbtn">🔖 보관함 <span class="cnt" id="libCnt">0</span></button>
    <select id="dateSel"></select>
    <input id="search" type="search" placeholder="제목·요약 검색...">
  </div>
</header>

<div class="briefing" id="briefing"></div>
<div class="filters" id="filters"></div>
<div class="meta-line" id="metaLine"></div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay"></div>

<script>
const CATS = ["전체","AI 활용/팁","도구 업데이트","LLM/언어모델","이미지/비디오","연구/논문","산업/투자","정책/규제","기타"];
let allItems = [], activeCat = "전체", query = "", viewMode = "feed";

const $ = s => document.querySelector(s);

// ── 스크랩(보관함): 브라우저 localStorage에 항목 전체 저장 ──
const SCRAP_KEY = "ai-news-scraps";
function loadScraps(){
  try{ return JSON.parse(localStorage.getItem(SCRAP_KEY)) || {}; }catch(e){ return {}; }
}
let scraps = loadScraps();
function saveScraps(){ localStorage.setItem(SCRAP_KEY, JSON.stringify(scraps)); }
function isScrapped(it){ return it && it.url && !!scraps[it.url]; }
function toggleScrap(it){
  if(!it || !it.url) return;
  if(scraps[it.url]) delete scraps[it.url];
  else scraps[it.url] = {...it, scrappedAt: new Date().toISOString()};
  saveScraps();
  updateLibCount();
  renderGrid();              // 카드 별표 동기화
}
function updateLibCount(){
  const n = Object.keys(scraps).length;
  $("#libCnt").textContent = n;
  $("#libBtn").classList.toggle("active", viewMode==="scraps");
}

function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if(isNaN(d)) return "";
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function renderFilters(){
  const box = $("#filters");
  box.innerHTML = "";
  CATS.forEach(c=>{
    const el = document.createElement("div");
    el.className = "chip" + (c===activeCat?" active":"");
    el.textContent = c;
    el.onclick = ()=>{ activeCat=c; renderFilters(); renderGrid(); };
    box.appendChild(el);
  });
}

function renderGrid(){
  const grid = $("#grid");
  const q = query.trim().toLowerCase();
  const source = viewMode==="scraps" ? Object.values(scraps) : allItems;
  let items = source.filter(it=>{
    if(activeCat!=="전체" && it.category!==activeCat) return false;
    if(q && !((it.title||"")+(it.summary||"")).toLowerCase().includes(q)) return false;
    return true;
  });
  if(viewMode==="scraps") items = items.sort((a,b)=>(b.scrappedAt||"").localeCompare(a.scrappedAt||""));
  $("#metaLine").textContent = viewMode==="scraps"
    ? `🔖 보관함 · ${items.length}건` : `${items.length}건 표시`;
  grid.innerHTML = "";
  if(!items.length){
    grid.innerHTML = viewMode==="scraps"
      ? `<div class="empty">아직 스크랩한 항목이 없어요.<br>카드의 ☆ 버튼을 눌러 보관해보세요.</div>`
      : `<div class="empty">표시할 항목이 없습니다.</div>`;
    return;
  }
  items.forEach(it=>{
    const card = document.createElement("div");
    card.className = "card";
    const thumb = it.thumbnail ? `<img class="thumb" src="${it.thumbnail}" loading="lazy" alt="">` : "";
    const typeLabel = {youtube:"▶ 영상", guide:"💡 가이드", hn:"🔥 HN", news:"📰 뉴스"}[it.type] || "📰 뉴스";
    const metric = it.metric ? `<span class="metric">${it.metric}</span>` : "";
    const on = isScrapped(it);
    card.innerHTML = `
      <button class="scrap-btn ${on?"on":""}" title="${on?"보관함에서 제거":"보관함에 저장"}">${on?"★":"☆"}</button>
      ${thumb}
      <div class="card-body">
        <div class="badges">
          <span class="badge ${esc(it.type)}">${typeLabel}</span>
          <span class="badge cat">${esc(it.category||"기타")}</span>
          <span class="source">${esc(it.source||"")}</span>
        </div>
        <div class="title">${esc(it.title||"")}</div>
        <div class="summary">${esc(it.summary||"")}</div>
        <div class="card-foot">
          <span>${fmtDate(it.published)} ${metric}</span><span class="more">자세히 읽기 →</span>
        </div>
      </div>`;
    card.querySelector(".scrap-btn").onclick = e=>{ e.stopPropagation(); toggleScrap(it); };
    card.onclick = ()=>openReader(it);
    grid.appendChild(card);
  });
}

function esc(s){
  return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function openReader(it){
  const typeLabel = {youtube:"▶ 영상", guide:"💡 가이드", hn:"🔥 HN", news:"📰 뉴스"}[it.type] || "📰 뉴스";
  const embed = it.type==="youtube" && it.videoId
    ? `<div class="embed"><iframe src="https://www.youtube.com/embed/${esc(it.videoId)}" allowfullscreen loading="lazy"></iframe></div>` : "";
  const points = (it.points && it.points.length)
    ? `<div class="sec-title">주요 내용</div><ul class="points">${it.points.map(p=>`<li>${esc(p)}</li>`).join("")}</ul>` : "";
  const takeaway = it.takeaway
    ? `<div class="takeaway"><b>왜 중요한가</b>${esc(it.takeaway)}</div>` : "";
  const metric = it.metric ? ` · ${esc(it.metric)}` : "";
  const ov = $("#overlay");
  ov.innerHTML = `
    <div class="reader">
      <button class="close" aria-label="닫기">✕</button>
      <div class="badges">
        <span class="badge ${esc(it.type)}">${typeLabel}</span>
        <span class="badge cat">${esc(it.category||"기타")}</span>
      </div>
      <h1>${esc(it.title||"")}</h1>
      <div class="r-meta">${esc(it.source||"")} · ${fmtDate(it.published)}${metric}</div>
      ${embed}
      <div class="detail">${esc(it.detail||it.summary||"")}</div>
      ${points}
      ${takeaway}
      <div class="r-actions">
        <button class="scrap-toggle ${isScrapped(it)?"on":""}">${isScrapped(it)?"★ 보관됨":"☆ 보관함에 저장"}</button>
        <a class="src-link" href="${esc(it.url)}" target="_blank" rel="noopener">원문에서 보기 ↗</a>
      </div>
    </div>`;
  ov.classList.add("open");
  document.body.style.overflow = "hidden";
  ov.querySelector(".close").onclick = closeReader;
  ov.querySelector(".reader").onclick = e=>e.stopPropagation();
  ov.onclick = closeReader;
  const st = ov.querySelector(".scrap-toggle");
  st.onclick = ()=>{
    toggleScrap(it);
    const on = isScrapped(it);
    st.classList.toggle("on", on);
    st.textContent = on ? "★ 보관됨" : "☆ 보관함에 저장";
  };
}

function closeReader(){
  $("#overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeReader(); });

function renderBriefing(b){
  const box = $("#briefing");
  if(!b || (!b.overview && !(b.highlights||[]).length)){ box.innerHTML=""; return; }
  const hl = (b.highlights||[]).map(h=>
    `<li><b>${esc(h.title||"")}</b> <span>${esc(h.line||"")}</span></li>`).join("");
  box.innerHTML = `
    <div class="briefing-inner">
      <h2>✨ 오늘의 핵심</h2>
      ${b.overview ? `<div class="overview">${esc(b.overview)}</div>` : ""}
      ${hl ? `<ol>${hl}</ol>` : ""}
    </div>`;
}

async function loadDate(date){
  try{
    const res = await fetch(`data/${date}.json`);
    const doc = await res.json();
    allItems = doc.items || [];
    renderBriefing(doc.briefing);
    $("#genTime").textContent = `· ${doc.date} 기준`;
  }catch(e){
    allItems = [];
    renderBriefing(null);
    $("#genTime").textContent = "";
  }
  renderGrid();
}

async function init(){
  renderFilters();
  updateLibCount();
  $("#search").addEventListener("input", e=>{ query=e.target.value; renderGrid(); });
  $("#libBtn").addEventListener("click", ()=>{
    viewMode = viewMode==="scraps" ? "feed" : "scraps";
    updateLibCount();
    renderGrid();
  });
  try{
    const man = await (await fetch("data/manifest.json")).json();
    const dates = man.dates || [];
    const sel = $("#dateSel");
    if(!dates.length){ showSetup(); return; }
    dates.forEach(d=>{ const o=document.createElement("option"); o.value=o.textContent=d; sel.appendChild(o); });
    sel.onchange = ()=>loadDate(sel.value);
    loadDate(dates[0]);
  }catch(e){ showSetup(); }
}

function showSetup(){
  $("#grid").innerHTML = `<div class="empty">
    아직 수집된 데이터가 없어요.<br><br>
    터미널에서 <code>python collect.py</code> 를 먼저 실행한 뒤<br>
    <code>python -m http.server 8000</code> 으로 이 페이지를 여세요.
  </div>`;
}

init();
</script>
</body>
</html>
